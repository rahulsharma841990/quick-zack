<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickZack – Project Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-glass: rgba(18, 18, 26, 0.92);
      --bg-card:  rgba(255, 255, 255, 0.035);
      --bg-hover: rgba(255, 255, 255, 0.07);
      --bg-active: rgba(139, 92, 246, 0.18);
      --border:   rgba(255, 255, 255, 0.08);
      --border-focus: rgba(139, 92, 246, 0.6);

      --text-primary:   #f0f0f5;
      --text-secondary: #8a8aa8;
      --text-muted:     #555570;

      --accent:        #8b5cf6;
      --accent-bright: #a78bfa;
      --accent-glow:   rgba(139, 92, 246, 0.35);

      --green:   #34d399;
      --blue:    #60a5fa;
      --orange:  #fb923c;
      --yellow:  #fbbf24;
      --pink:    #f472b6;
      --teal:    #2dd4bf;

      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App Shell ─────────────────────────────────────────────────────── */
    #app {
      width: 100%; height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      animation: slideDown 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }

    /* ── Main Card ─────────────────────────────────────────────────────── */
    #launcher {
      width: 100%;
      max-width: 700px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 80px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(139, 92, 246, 0.08);
      overflow: hidden;
    }

    /* ── Search Bar ────────────────────────────────────────────────────── */
    #search-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    #search-icon {
      flex-shrink: 0;
      width: 22px; height: 22px;
      color: var(--accent-bright);
      opacity: 0.8;
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 18px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      caret-color: var(--accent-bright);
    }

    #search-input::placeholder {
      color: var(--text-muted);
      font-weight: 300;
    }

    #spinner {
      flex-shrink: 0;
      width: 18px; height: 18px;
      border: 2px solid rgba(139,92,246,0.2);
      border-top-color: var(--accent-bright);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    #spinner.active { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    #kbd-hint {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.04);
      line-height: 1.5;
    }

    /* ── Results List ──────────────────────────────────────────────────── */
    #results-wrap {
      max-height: 380px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(139,92,246,0.3) transparent;
    }

    #results-wrap::-webkit-scrollbar { width: 4px; }
    #results-wrap::-webkit-scrollbar-thumb {
      background: rgba(139,92,246,0.3);
      border-radius: 99px;
    }

    #results-list {
      list-style: none;
      padding: 8px 0;
    }

    /* ── Empty / Status Messages ───────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 24px;
      color: var(--text-muted);
      text-align: center;
    }

    #empty-state svg {
      opacity: 0.25;
      width: 48px; height: 48px;
    }

    #empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    #empty-state span {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ── Result Item ───────────────────────────────────────────────────── */
    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.1s ease;
      border-radius: 0;
      position: relative;
    }

    .result-item:hover,
    .result-item.active {
      background: var(--bg-hover);
    }

    .result-item.active {
      background: var(--bg-active);
    }

    .result-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; height: 80%;
      width: 3px;
      background: var(--accent-bright);
      border-radius: 0 3px 3px 0;
    }

    /* ── Project Icon ──────────────────────────────────────────────────── */
    .proj-icon {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .proj-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0.1;
    }

    /* Type-colored icon bg */
    .proj-icon.type-node   { border-color: rgba(52,211,153,0.25); }
    .proj-icon.type-php    { border-color: rgba(96,165,250,0.25); }
    .proj-icon.type-python { border-color: rgba(251,191,36,0.25); }
    .proj-icon.type-rust   { border-color: rgba(251,146,60,0.25); }
    .proj-icon.type-go     { border-color: rgba(45,212,191,0.25); }
    .proj-icon.type-java   { border-color: rgba(244,114,182,0.25); }
    .proj-icon.type-git    { border-color: rgba(139,92,246,0.25); }
    .proj-icon.type-folder { border-color: rgba(255,255,255,0.1); }

    /* ── Project Info ──────────────────────────────────────────────────── */
    .proj-info {
      flex: 1;
      min-width: 0;
    }

    .proj-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    /* Highlighted match characters */
    .proj-name mark {
      background: transparent;
      color: var(--accent-bright);
      font-weight: 600;
    }

    .proj-path {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .proj-action {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .result-item.active .proj-action,
    .result-item:hover .proj-action {
      opacity: 1;
    }

    .proj-action kbd {
      font-size: 10px;
    }

    /* SSH badge chip */
    .ssh-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(45, 212, 191, 0.12);
      border: 1px solid rgba(45, 212, 191, 0.35);
      color: var(--teal);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .ssh-badge:hover,
    .ssh-badge.ssh-focus {
      background: rgba(45, 212, 191, 0.22);
      border-color: rgba(45, 212, 191, 0.7);
      box-shadow: 0 0 8px rgba(45, 212, 191, 0.25);
    }

    .open-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.35);
      color: var(--accent-bright);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .open-badge:hover,
    .open-badge.open-focus {
      background: rgba(139, 92, 246, 0.25);
      border-color: rgba(139, 92, 246, 0.7);
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.3);
    }

    /* Left indicator pulse for SFTP projects */
    .result-item.has-sftp.active::before {
      background: var(--teal);
    }

    /* ── Footer Bar ────────────────────────────────────────────────────── */
    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 20px;
      border-top: 1px solid var(--border);
    }

    #footer-left {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      color: var(--text-muted);
    }

    #project-count {
      color: var(--accent-bright);
      font-weight: 500;
    }

    #footer-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .footer-btn:hover {
      border-color: var(--accent);
      color: var(--accent-bright);
      background: var(--bg-active);
    }

    /* ── Section Label ─────────────────────────────────────────────────── */
    .section-label {
      padding: 6px 20px 2px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Scrollbar region top shadow ───────────────────────────────────── */
    #results-wrap::before {
      content: '';
      position: sticky;
      top: 0; left: 0; right: 0;
      height: 20px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="launcher">

    <!-- Search Input -->
    <div id="search-wrap">
      <svg id="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
      </svg>

      <input
        id="search-input"
        type="text"
        placeholder="Search projects…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />

      <div id="spinner"></div>

      <div id="kbd-hint">
        <kbd>↑↓</kbd> navigate &nbsp;
        <kbd>↵</kbd> open &nbsp;
        <kbd>Esc</kbd> close
      </div>
    </div>

    <!-- Results -->
    <div id="results-wrap">
      <div id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.226-.026.344-.026h15.812c.118 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776"/>
        </svg>
        <p>Start typing to search your projects</p>
        <span>Scanning <span id="path-display">…</span></span>
      </div>
      <ul id="results-list" style="display:none;"></ul>
    </div>

    <!-- Footer -->
    <div id="footer">
      <div id="footer-left">
        <span>⚡ QuickZack</span>
        <span><span id="project-count">0</span> projects indexed</span>
      </div>
      <div id="footer-right">
        <button class="footer-btn" id="btn-rescan" title="Re-index projects">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
          </svg>
          Rescan
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allProjects = [];
let filteredProjects = [];
let activeIndex = -1;
let activeAction = 'none'; // 'none' | 'ssh' | 'open'
let fuse = null;
let config = {};

// ── Elements ───────────────────────────────────────────────────────────────
const searchInput   = document.getElementById('search-input');
const resultsList   = document.getElementById('results-list');
const emptyState    = document.getElementById('empty-state');
const spinner       = document.getElementById('spinner');
const projectCount  = document.getElementById('project-count');
const pathDisplay   = document.getElementById('path-display');
const btnRescan     = document.getElementById('btn-rescan');

// ── Project Type Icons ─────────────────────────────────────────────────────
const TYPE_ICONS = {
  node:   '📦',
  php:    '🐘',
  python: '🐍',
  rust:   '🦀',
  go:     '🐹',
  java:   '☕',
  git:    '🔀',
  folder: '📁'
};

// ── Initialize ─────────────────────────────────────────────────────────────
async function init() {
  config = await window.api.getConfig();
  pathDisplay.textContent = config.projects_path;

  setSpinner(true);
  allProjects = await window.api.getProjects();
  setSpinner(false);

  buildFuse();
  projectCount.textContent = allProjects.length;

  // Auto-show all if no query
  if (searchInput.value.trim() === '') {
    showAll();
  }
}

function buildFuse() {
  fuse = new Fuse(allProjects, {
    keys: ['name'],
    threshold: 0.4,
    includeMatches: true,
    minMatchCharLength: 1,
    findAllMatches: true
  });
}

// ── Focus Reset (called when window re-shows) ──────────────────────────────
function resetAndFocus() {
  searchInput.value = '';
  searchInput.focus();
  activeIndex = -1;
  if (allProjects.length > 0) showAll();
}

// ── Spinner ────────────────────────────────────────────────────────────────
function setSpinner(on) {
  spinner.classList.toggle('active', on);
}

// ── Render All (no query) ──────────────────────────────────────────────────
function showAll() {
  filteredProjects = allProjects.slice(0, 50); // cap at 50 for performance
  renderResults(filteredProjects.map(p => ({ item: p, matches: [] })));
}

// ── Search ─────────────────────────────────────────────────────────────────
function doSearch(query) {
  if (!query.trim()) {
    showAll();
    return;
  }

  const results = fuse.search(query, { limit: 50 });
  filteredProjects = results.map(r => r.item);
  renderResults(results);
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderResults(items) {
  resultsList.innerHTML = '';
  activeIndex = -1;

  if (items.length === 0) {
    resultsList.style.display = 'none';
    emptyState.style.display  = 'flex';
    emptyState.querySelector('p').textContent = 'No matching projects found';
    emptyState.querySelector('span').textContent = `Try a different search term`;
    return;
  }

  emptyState.style.display   = 'none';
  resultsList.style.display  = 'block';

  items.forEach((result, idx) => {
    const project = result.item || result;
    const matches = result.matches || [];
    const isSftp  = !!project.hasSftp;

    const li = document.createElement('li');
    li.className = 'result-item' + (isSftp ? ' has-sftp' : '');
    li.dataset.index = idx;
    li.dataset.path  = project.path;
    li.dataset.name  = project.name;
    if (isSftp) li.dataset.sftp = JSON.stringify(project.sftpConfig);

    // Build highlighted name
    const nameHTML = buildHighlightedName(project.name, matches);

    // SFTP icon overlay
    const sftpDot = isSftp
      ? `<span title="sftp.json found" style="position:absolute;bottom:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 5px rgba(45,212,191,0.7);"></span>`
      : '';

    // Action area
    const actionHTML = isSftp
      ? `<div class="proj-action">
           <span class="ssh-badge" data-idx="${idx}" title="Open SSH terminal (Shift+Enter)">⚡ SSH</span>
           <span class="open-badge" data-idx="${idx}" title="Open in editor (Enter)">📂 Open</span>
         </div>`
      : `<div class="proj-action">Open <kbd>↵</kbd></div>`;

    li.innerHTML = `
      <div class="proj-icon type-${project.type}" title="${project.type}" style="position:relative;">
        ${TYPE_ICONS[project.type] || '📁'}${sftpDot}
      </div>
      <div class="proj-info">
        <div class="proj-name">${nameHTML}</div>
        <div class="proj-path">${project.path}${
          isSftp ? ` <span style="color:var(--teal);font-size:10px;margin-left:4px;">● SSH</span>` : ''
        }</div>
      </div>
      ${actionHTML}
    `;

    // Click on row → open project (unless clicking SSH badge)
    li.addEventListener('click', (e) => {
      if (e.target.closest('.ssh-badge')) {
        openSsh(project.sftpConfig, project.name);
      } else {
        openProject(project.path);
      }
    });
    li.addEventListener('mouseenter', () => setActive(idx, false));

    resultsList.appendChild(li);
  });

  // Activate first item
  if (items.length > 0) setActive(0, false);
}

function buildHighlightedName(name, matches) {
  if (!matches || matches.length === 0) return escapeHtml(name);

  const nameMatch = matches.find(m => m.key === 'name');
  if (!nameMatch || !nameMatch.indices) return escapeHtml(name);

  let result = '';
  let lastIdx = 0;
  const indices = nameMatch.indices;

  for (const [start, end] of indices) {
    result += escapeHtml(name.slice(lastIdx, start));
    result += `<mark>${escapeHtml(name.slice(start, end + 1))}</mark>`;
    lastIdx = end + 1;
  }
  result += escapeHtml(name.slice(lastIdx));
  return result;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Active Item Management ─────────────────────────────────────────────────
function clearActionFocus() {
  resultsList.querySelectorAll('.ssh-badge, .open-badge').forEach(el => {
    el.classList.remove('ssh-focus', 'open-focus');
  });
  activeAction = 'none';
}

function setActionFocus(action) {
  clearActionFocus();
  activeAction = action;
  const items = resultsList.querySelectorAll('.result-item');
  const el = items[activeIndex];
  if (!el) return;
  if (action === 'ssh') {
    el.querySelector('.ssh-badge')?.classList.add('ssh-focus');
  } else if (action === 'open') {
    el.querySelector('.open-badge')?.classList.add('open-focus');
  }
}

function setActive(index, scroll = true) {
  const items = resultsList.querySelectorAll('.result-item');
  items.forEach(el => el.classList.remove('active'));
  clearActionFocus();

  if (index < 0) index = items.length - 1;
  if (index >= items.length) index = 0;

  activeIndex = index;
  const el = items[activeIndex];
  if (el) {
    el.classList.add('active');
    if (scroll) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ── Open Project ───────────────────────────────────────────────────────────
async function openProject(projectPath) {
  if (!projectPath) return;

  // Flash the active item for feedback
  const items = resultsList.querySelectorAll('.result-item');
  const active = items[activeIndex];
  if (active) {
    active.style.background = 'rgba(139, 92, 246, 0.35)';
    active.style.transition = 'background 0.05s';
  }

  setTimeout(async () => {
    await window.api.openProject(projectPath);
  }, 80);
}

// ── Open SSH ───────────────────────────────────────────────────────────────
async function openSsh(sftpConfig, projectName) {
  if (!sftpConfig) return;

  const items = resultsList.querySelectorAll('.result-item');
  const active = items[activeIndex];
  if (active) {
    active.style.background = 'rgba(45, 212, 191, 0.25)';
    active.style.transition = 'background 0.05s';
  }

  setTimeout(async () => {
    await window.api.openSsh(sftpConfig, projectName || '');
  }, 80);
}

// ── Keyboard Handler ───────────────────────────────────────────────────────
searchInput.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowDown':
      e.preventDefault();
      setActive(activeIndex + 1);
      break;

    case 'ArrowUp':
      e.preventDefault();
      setActive(activeIndex - 1);
      break;

    case 'ArrowRight': {
      // Only act when current row has SFTP buttons
      const items = resultsList.querySelectorAll('.result-item');
      const el = items[activeIndex];
      if (!el || !el.dataset.sftp) break;
      e.preventDefault();
      if (activeAction === 'none' || activeAction === 'open') {
        setActionFocus('ssh');
      } else if (activeAction === 'ssh') {
        setActionFocus('open');
      }
      break;
    }

    case 'ArrowLeft': {
      const items = resultsList.querySelectorAll('.result-item');
      const el = items[activeIndex];
      if (!el || !el.dataset.sftp) break;
      e.preventDefault();
      if (activeAction === 'none' || activeAction === 'ssh') {
        setActionFocus('open');
      } else if (activeAction === 'open') {
        setActionFocus('ssh');
      }
      break;
    }

    case 'Enter': {
      e.preventDefault();
      const items = resultsList.querySelectorAll('.result-item');
      const active = items[activeIndex];
      if (!active) break;
      if (activeAction === 'ssh' && active.dataset.sftp) {
        openSsh(JSON.parse(active.dataset.sftp), active.dataset.name || '');
      } else {
        openProject(active.dataset.path);
      }
      break;
    }

    case 'Escape':
      e.preventDefault();
      window.api.hideWindow();
      break;

    case 'Tab':
      e.preventDefault();
      setActive(e.shiftKey ? activeIndex - 1 : activeIndex + 1);
      break;
  }
});

// ── Search Input ───────────────────────────────────────────────────────────
let searchDebounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    doSearch(searchInput.value);
  }, 80);
});

// ── Rescan ─────────────────────────────────────────────────────────────────
btnRescan.addEventListener('click', async () => {
  setSpinner(true);
  btnRescan.disabled = true;
  btnRescan.textContent = 'Scanning…';

  allProjects = await window.api.rescanProjects();
  buildFuse();
  projectCount.textContent = allProjects.length;

  setSpinner(false);
  btnRescan.disabled = false;
  btnRescan.innerHTML = `
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
    </svg>
    Rescan
  `;

  doSearch(searchInput.value);
});

// ── IPC Events ─────────────────────────────────────────────────────────────

// Window shown → reset search and focus
window.api.onWindowFocus(() => {
  resetAndFocus();
});

// Projects externally updated
window.api.onProjectsUpdated((projects) => {
  allProjects = projects;
  buildFuse();
  projectCount.textContent = allProjects.length;
  doSearch(searchInput.value);
});

// Config live-reloaded (projects_path changed etc.)
window.api.onConfigUpdated((cfg) => {
  config = cfg;
  pathDisplay.textContent = cfg.projects_path;
});

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
